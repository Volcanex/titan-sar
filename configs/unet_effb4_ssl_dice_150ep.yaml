architecture: Unet
encoder: efficientnet-b4
# Use "imagenet" during model creation, then overwrite with SSL weights.
# Pass --encoder-weights none and the script below loads SSL weights manually.
encoder_weights: null
ssl_weights_path: models/ssl_encoder_effb4.pth
in_channels: 1
classes: 6
lr: 5.0e-4
batch_size: 8
epochs: 150
loss: dice
optimizer: adamw
scheduler: cosine
augmentations:
  - hflip
  - vflip
  - rotate90
  - gaussian_noise
